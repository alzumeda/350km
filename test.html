  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; }
  
  header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: 1px; color: var(--blue); }
  #run-all { background: var(--green); color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700; }
  #run-all:hover { opacity: 0.85; }
  #stats { margin-left: auto; font-size: 12px; color: var(--muted); }
  
  #progress-bar { height: 3px; background: var(--surface2); }

  .section { margin-bottom: 24px; }

  .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 8px; }
  
  .test-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; position: relative; overflow: hidden; }
  .test-card.pass  { border-color: var(--green); }
  .test-card.fail  { border-color: var(--red); }
  .test-card.skip  { border-color: var(--yellow); opacity: 0.6; }
  .test-card.running::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--blue); animation: scan 1s linear infinite; }
  @keyframes scan { 0%{left:0;right:100%} 50%{left:0;right:0} 100%{left:100%;right:0} }

  .test-name { font-weight: 700; margin-bottom: 4px; font-size: 12px; }
  .test-fn   { color: var(--blue); font-size: 11px; margin-bottom: 6px; }
  .test-result { font-size: 11px; min-height: 16px; }
  .pass .test-result { color: var(--green); }
  .fail .test-result { color: var(--red); }
  .skip .test-result { color: var(--yellow); }

  .log-info { color: var(--muted); }

test('Valhalla', 'DE_BORDER_KEY_POINTS: Max gap < 2×350km (full coverage)', () => {
  function haversine(lat1,lon1,lat2,lon2) {
    const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.asin(Math.sqrt(a));
  }
  let maxGap = 0;
  for (let i=0; i<DE_BORDER_KEY_POINTS.length; i++) {
    const a=DE_BORDER_KEY_POINTS[i], b=DE_BORDER_KEY_POINTS[(i+1)%DE_BORDER_KEY_POINTS.length];
    maxGap = Math.max(maxGap, haversine(a.lat,a.lon,b.lat,b.lon));
  }
  assert(maxGap < 700, `Max gap ${maxGap.toFixed(0)}km exceeds 2×350km=700km`);
});

test('Radius Math', 'OSRM projection: cos(lat) correction', () => {
  // Test that projection actually places points ~radiusKm from border
  const cx=10.4515, cy=51.1657, radiusKm=350;
  const [bLng,bLat] = [6.865, 47.271];
  const cosLat = Math.cos(((bLat+cy)/2)*Math.PI/180);
  const dxKm=(bLng-cx)*111*cosLat, dyKm=(bLat-cy)*111;
  const lenKm=Math.sqrt(dxKm*dxKm+dyKm*dyKm)||1;
  const destLng=bLng+(dxKm/lenKm)*radiusKm/(111*cosLat);
  const destLat=bLat+(dyKm/lenKm)*radiusKm/111;
  const cosCheck=Math.cos(bLat*Math.PI/180);
  const actual=Math.sqrt(((destLng-bLng)*111*cosCheck)**2+((destLat-bLat)*111)**2);
  assertClose(actual, radiusKm, 15, 'Projected point distance');
});

test('Radius Math', 'Speed assumption: 85km/h for time mode', () => {

// ── BUG 6: OSRM concave hull cutoffs ─────────────────────
test('Border Regression', 'BUG6: OSRM projection uses cos(lat) correction', () => {
  // Without cos(lat): projects only ~300km instead of 350km
  // With cos(lat): projects correctly to ~350km
  const cx = 10.4515, cy = 51.1657, radiusKm = 350;
  const [bLng, bLat] = [6.865, 47.271]; // SW border point
  
  // WRONG (old): no cos(lat)
  const dx = bLng - cx, dy = bLat - cy;
  const lenDeg = Math.sqrt(dx*dx + dy*dy);
  const wrongScale = radiusKm / 111 / lenDeg;
  const wrongDist = Math.sqrt(
    (dx * wrongScale * 111 * Math.cos(bLat*Math.PI/180))**2 +
    (dy * wrongScale * 111)**2
  );
  
  // CORRECT (new): with cos(lat)
  const cosLat = Math.cos(((bLat+cy)/2)*Math.PI/180);
  const dxKm = dx*111*cosLat, dyKm = dy*111;
  const lenKm = Math.sqrt(dxKm*dxKm + dyKm*dyKm);
  const destLng = bLng + (dxKm/lenKm)*radiusKm/(111*cosLat);
  const destLat = bLat + (dyKm/lenKm)*radiusKm/111;
  const cosCheck = Math.cos(bLat*Math.PI/180);
  const correctDist = Math.sqrt(
    ((destLng-bLng)*111*cosCheck)**2 + ((destLat-bLat)*111)**2
  );
  
  // Old method was ~300km, new is ~350km
  assert(wrongDist < 320, `Old method should be wrong (${wrongDist.toFixed(0)}km)`);
  assert(Math.abs(correctDist - radiusKm) < 15, 
    `New method should be ~350km (got ${correctDist.toFixed(0)}km)`);
  assert(correctDist > wrongDist + 20, 'Correct method should give significantly larger distance');
});

// ── RUN ENGINE ────────────────────────────────────────────

function log(msg, cls='log-info') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function renderTests() {
  const container = document.getElementById('test-container');
  const sections = {};
  TESTS.forEach(t => {
    if (!sections[t.section]) sections[t.section] = [];
    sections[t.section].push(t);
  });

  container.innerHTML = '';
  for (const [sec, tests] of Object.entries(sections)) {
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `<div class="section-title">${sec} (${tests.length})</div><div class="test-grid" id="grid-${sec.replace(/\s/g,'_')}"></div>`;
    container.appendChild(div);
    const grid = div.querySelector('.test-grid');
    tests.forEach((t, i) => {
      const card = document.createElement('div');
      card.className = 'test-card';
      card.id = `card-${sec}-${i}`;
      card.innerHTML = `
        <div class="test-name">${t.name}</div>
        <div class="test-fn">${t.section} / ${t.fn || '—'}</div>
        <div class="test-result" id="result-${sec}-${i}">—</div>`;
      grid.appendChild(card);
    });
  }
}

async function runAll() {
  passed = 0; failed = 0; skipped = 0;
  document.getElementById('log').innerHTML = '';
  document.getElementById('stats').textContent = 'Läuft…';
  document.getElementById('progress-fill').style.width = '0%';
  log('▶ Test-Suite startet…', 'log-info');

  const sections = {};
  TESTS.forEach(t => {
    if (!sections[t.section]) sections[t.section] = [];
    sections[t.section].push(t);
  });

  let done = 0;
  for (const [sec, tests] of Object.entries(sections)) {
    for (let i=0; i<tests.length; i++) {
      const t = tests[i];
      const card = document.getElementById(`card-${sec}-${i}`);
      const result = document.getElementById(`result-${sec}-${i}`);
      card.className = 'test-card running';

      await new Promise(r => setTimeout(r, 10)); // allow UI update

      try {
        await t.fn();
        card.className = 'test-card pass';
        result.textContent = '✓ Bestanden';
        log(`✓ ${sec} / ${t.name}`, 'log-pass');
        passed++;
      } catch(e) {
        card.className = 'test-card fail';
        result.textContent = '✗ ' + e.message;
        log(`✗ ${sec} / ${t.name}: ${e.message}`, 'log-fail');
        failed++;
      }

      done++;
      document.getElementById('progress-fill').style.width = `${(done/TESTS.length*100).toFixed(0)}%`;
      document.getElementById('stats').textContent = `${passed}✓ ${failed}✗ ${skipped}⊘ / ${TESTS.length}`;
    }
  }

  const allPass = failed === 0;
  log('', 'log-info');
  log(`─── ${TESTS.length} Tests: ${passed} bestanden, ${failed} fehlgeschlagen, ${skipped} übersprungen ───`,
    allPass ? 'log-pass' : 'log-fail');
  document.getElementById('progress-fill').style.background = allPass ? 'var(--green)' : 'var(--red)';
}

// Init
window.addEventListener('load', () => {
  try {
    renderTests();
    document.getElementById('loading-scripts').style.display = 'none';
    document.getElementById('test-container').style.display = 'block';
    log('✓ App-Skripte geladen. Bereit.', 'log-pass');
    // Auto-run
    setTimeout(runAll, 500);
  } catch(e) {
    document.getElementById('loading-scripts').textContent = '✗ Skript-Fehler: ' + e.message;
  }
});
</script>
